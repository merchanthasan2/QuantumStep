<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Presentation | EngageIQ</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        violet: { 500: '#7C3AED', 600: '#6D28D9', 950: '#2e1065' },
                        slate: { 950: '#020617' }
                    }
                }
            }
        }
    </script>

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: white;
            overflow: hidden;
        }

        .slide-container {
            height: calc(100vh - 80px);
        }

        .exit-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            border-radius: 999px;
            color: #fca5a5;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .exit-btn:hover {
            background: rgba(239, 68, 68, 0.25);
            border-color: rgba(239, 68, 68, 0.5);
            color: #fff;
        }

        .brand-logo {
            height: 28px;
            width: auto;
            border-radius: 6px;
            object-fit: contain;
        }

        .premium-lock-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            background: rgba(251, 191, 36, 0.08);
            border: 1px solid rgba(251, 191, 36, 0.2);
            border-radius: 999px;
            font-size: 0.65rem;
            font-weight: 700;
            color: #fbbf24;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.04em;
        }

        .premium-lock-badge:hover {
            background: rgba(251, 191, 36, 0.15);
        }

        .slide {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            opacity: 0;
            pointer-events: none;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .slide.active {
            opacity: 1;
            pointer-events: auto;
        }

        .glass-header {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .qr-mini {
            background: white;
            padding: 4px;
            border-radius: 8px;
        }

        .vote-bar {
            height: 60px;
            border-radius: 12px;
            background: rgba(124, 58, 237, 0.1);
            border: 1px solid rgba(124, 58, 237, 0.2);
            position: relative;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        .vote-fill {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            background: linear-gradient(90deg, #7C3AED, #60a5fa);
            width: 0%;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .word-cloud-item {
            position: absolute;
            transition: all 0.5s ease;
        }
    </style>
</head>

<body>
    <!-- Live Header -->
    <header class="glass-header h-20 fixed top-0 w-full flex items-center justify-between px-10 z-50">
        <div class="flex items-center gap-6">
            <!-- EngageIQ Logo -->
            <a href="dashboard.html" class="flex items-center gap-3" style="text-decoration:none;">
                <div class="w-8 h-8 bg-violet-600 rounded-lg flex items-center justify-center">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                    </svg>
                </div>
                <span class="font-black text-xs uppercase tracking-tighter">EngageIQ</span>
            </a>
            <div class="h-8 w-[1px] bg-white/10"></div>
            <!-- Branding: injected by JS -->
            <div id="header-branding" class="flex items-center gap-3">
                <!-- Premium: brand logo + name || Free: lock badge -->
            </div>
            <div class="h-8 w-[1px] bg-white/10 hidden" id="branding-divider"></div>
            <div class="text-sm font-medium text-slate-400 header-session-title">Untitled Session</div>
        </div>

        <div class="flex items-center gap-5">
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <div
                        class="text-[10px] font-black tracking-widest text-slate-500 uppercase header-instruction-text">
                        Join at ...</div>
                    <div class="text-xl font-black text-violet-400 header-session-id">--- ---</div>
                </div>
                <div id="qrcode-mini"
                    class="qr-mini w-12 h-12 flex items-center justify-center text-[8px] text-slate-400">...</div>
            </div>
            <div
                class="flex items-center gap-2 bg-emerald-500/10 text-emerald-500 px-3 py-1 rounded-full text-[10px] font-black border border-emerald-500/20">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                LIVE
            </div>
            <!-- Exit Button (hidden in embed mode) -->
            <div class="flex items-center gap-2" id="exit-btn-group">
                <!-- End Session: sets status to 'ended', triggers feedback on mobile -->
                <button onclick="endSession()"
                    class="exit-btn !bg-emerald-500/10 !border-emerald-500/20 !text-emerald-400 hover:!bg-emerald-500 hover:!text-white transition-all"
                    title="End Session & collect feedback">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                        <polyline points="22 4 12 14.01 9 11.01" />
                    </svg>
                    End Session
                </button>
                <button id="exit-btn" onclick="exitPresentation()" class="exit-btn" title="Exit (Esc)">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                    Exit
                </button>
                <button onclick="deleteThisSession()"
                    class="exit-btn !bg-rose-500/5 !border-rose-500/10 !text-rose-400/70 hover:!bg-rose-500 hover:!text-white transition-all"
                    title="Delete Session">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <polyline points="3 6 5 6 21 6" />
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Slide Container -->
    <div id="slide-container" class="slide-container mt-20 relative">
        <div class="flex flex-col items-center justify-center h-full space-y-4">
            <div class="w-12 h-12 border-4 border-violet-500/20 border-t-violet-500 rounded-full animate-spin"></div>
            <p class="text-slate-500 font-bold animate-pulse">Connecting to session...</p>
        </div>
    </div>

    <!-- Controls -->
    <div id="controls" class="fixed bottom-10 left-1/2 -translate-x-1/2 flex items-center gap-6 z-50 hidden">
        <button onclick="prevSlide()"
            class="w-12 h-12 rounded-full glass-header flex items-center justify-center text-slate-500 hover:text-white transition-all">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="15 18 9 12 15 6" />
            </svg>
        </button>
        <div class="glass-header px-6 py-2 rounded-full font-black text-sm tracking-widest text-slate-500">
            <span id="current-slide">1</span> / <span id="total-slides">1</span>
        </div>
        <button onclick="nextSlide()"
            class="w-12 h-12 rounded-full glass-header flex items-center justify-center text-slate-500 hover:text-white transition-all">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="9 18 15 12 9 6" />
            </svg>
        </button>
    </div>

    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <!-- Quiz Controls UI -->
    <div id="quiz-controls" class="fixed bottom-32 left-1/2 -translate-x-1/2 flex items-center gap-4 z-50 hidden">
        <button id="reveal-btn" onclick="revealAnswer()"
            class="bg-violet-600 hover:bg-violet-700 text-white px-8 py-3 rounded-2xl font-black shadow-xl shadow-violet-900/20 transition-all flex items-center gap-2">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
            </svg>
            REVEAL ANSWER
        </button>
        <button id="leaderboard-btn" onclick="showLeaderboard()"
            class="bg-slate-800 hover:bg-slate-700 text-white px-8 py-3 rounded-2xl font-black shadow-xl border border-white/10 transition-all flex items-center gap-2">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path
                    d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17M14 14.66V17M18 2H6v7a6 6 0 0 0 12 0V2z" />
            </svg>
            LEADERBOARD
        </button>
        <div id="timer-display"
            class="bg-slate-900/80 border border-white/10 px-6 py-3 rounded-2xl font-black text-2xl text-violet-400 min-w-[80px] text-center hidden">
            00
        </div>
    </div>

    <!-- Leaderboard Overlay -->
    <div id="leaderboard-overlay"
        class="fixed inset-0 z-[100] bg-slate-950/95 backdrop-blur-xl flex items-center justify-center p-10 hidden opacity-0 transition-all duration-500">
        <div class="absolute top-10 right-10">
            <button onclick="hideLeaderboard()"
                class="w-12 h-12 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-white hover:bg-white/10 transition-all">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
        </div>
        <div class="w-full max-w-4xl text-center">
            <div
                class="inline-flex items-center gap-3 px-6 py-2 bg-violet-600/20 border border-violet-600/30 rounded-full text-violet-400 font-black tracking-widest text-xs uppercase mb-8">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <path
                        d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17M14 14.66V17M18 2H6v7a6 6 0 0 0 12 0V2z" />
                </svg>
                Top Performers
            </div>
            <h2 class="text-6xl font-black mb-12 grad-text">Leaderboard</h2>
            <div id="leaderboard-list" class="space-y-4"></div>
            <div id="leaderboard-empty" class="text-slate-500 font-bold text-xl py-20 hidden">
                No scores recorded yet. Start participating!
            </div>
        </div>
    </div>

    <style>
        .grad-text {
            background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .leaderboard-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .leaderboard-item:nth-child(1) {
            background: linear-gradient(90deg, rgba(124, 58, 237, 0.1), transparent);
            border-color: rgba(124, 58, 237, 0.2);
        }

        @keyframes slide-up {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-slide-up {
            animation: slide-up 0.5s ease forwards;
        }
    </style>

    <!-- Firebase & Custom Logic -->
    <script type="module">
        import { db, ref, onValue, update, set } from './firebase-config.js';

        const urlParams = new URLSearchParams(window.location.search);
        let currentSlide = 1;
        let sessionData = null;
        const sessionId = urlParams.get('id') || "582914";
        const sessionRef = ref(db, `sessions/${sessionId}`);
        const isEmbed = urlParams.get('embed') === 'true';
        let timerInterval = null;

        if (isEmbed) {
            // Add a style tag immediately to hide UI
            const style = document.createElement('style');
            style.innerHTML = `
                header, #controls, #quiz-controls, #exit-btn { display: none !important; }
                #slide-container { margin-top: 0 !important; height: 100vh !important; }
                body { background: transparent !important; }
            `;
            document.head.appendChild(style);
        }

        // Exit presentation handler
        window.exitPresentation = function () {
            // Check if we are in fullscreen
            if (document.fullscreenElement) {
                document.exitFullscreen().catch(() => { });
            }
            window.location.href = 'dashboard.html';
        };

        window.deleteThisSession = function () {
            if (confirm('Are you absolutely sure you want to DELETE this presentation? This cannot be undone.')) {
                set(ref(db, `sessions/${sessionId}`), null)
                    .then(() => {
                        window.location.href = 'dashboard.html';
                    })
                    .catch(err => alert("Delete failed: " + err.message));
            }
        };



        function renderSlides(data) {
            const container = document.getElementById('slide-container');
            container.innerHTML = '';

            // Slide 1: Welcome (Universal)
            const sessionTitle = data.title || 'Untitled Session';
            const brandName = data.branding?.name ? data.branding.name : 'EngageIQ';
            const brandLogoHtml = data.branding?.logoUrl
                ? `<img src="${data.branding.logoUrl}" alt="Brand Logo" class="h-16 md:h-20 mx-auto mb-6 object-contain rounded-lg">`
                : `<div class="h-16 md:h-20 mb-6 flex items-center justify-center"><span class="text-3xl">🚀</span></div>`;

            const welcomeSlide = `
                <div id="slide-1" class="slide ${currentSlide === 1 ? 'active' : ''}">
                    <div class="text-center max-w-4xl mx-auto mt-8 md:mt-0">
                        ${brandLogoHtml}
                        <p class="text-violet-400 font-black uppercase tracking-[0.25em] text-xs md:text-sm mb-4 md:mb-6">${brandName} invites you to</p>
                        <h1 class="font-black mb-8 md:mb-10 leading-tight" style="font-size:clamp(2rem,5vw,4.5rem);">${sessionTitle}</h1>
                        <div class="mb-8 md:mb-10 inline-block bg-white p-4 md:p-6 rounded-[2rem] shadow-2xl shadow-violet-500/30">
                            <div id="qrcode-large"></div>
                        </div>
                        <p class="text-lg md:text-xl text-slate-400">Scan the QR code or visit <span class="text-white font-bold underline instruction-url">${window.location.host}</span> &nbsp;·&nbsp; Code: <span class="text-violet-400 font-black text-2xl tracking-widest">${sessionId.substring(0, 3)} ${sessionId.substring(3)}</span></p>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', welcomeSlide);

            // Dynamic Interaction Slides
            (data.slides || []).forEach((slide, index) => {
                const slideNum = index + 2;
                const type = slide.type || 'POLL';
                const icon = {
                    POLL: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="16" /><line x1="8" y1="12" x2="16" y2="12" /></svg>',
                    WORD_CLOUD: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17.5 19a3.5 3.5 0 1 1 0-7c.1 0 .3 0 .4.1A6.5 6.5 0 1 1 8 13.5c0-.1 0-.3.1-.4A4.5 4.5 0 1 1 5 19h12.5z"/></svg>',
                    QA: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
                    SLIDER: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><path d="M8 6v6"/><path d="M16 12v6"/></svg>'
                }[type];

                let contentHtml = '';
                if (type === 'POLL') {
                    contentHtml = `
                        <div class="space-y-6 w-full vote-options-container">
                            ${(slide.options || []).map((opt, optIndex) => `
                                <div class="relative option-wrapper" data-index="${optIndex}">
                                    <div class="flex justify-between items-center mb-2 px-2">
                                        <span class="text-xl font-bold option-text">${opt}</span>
                                        <span class="text-xl font-black text-violet-400 percent-label">0%</span>
                                    </div>
                                    <div class="vote-bar relative">
                                        <div class="vote-fill" style="width: 0%"></div>
                                        <div class="correct-indicator absolute right-4 top-1/2 -translate-y-1/2 opacity-0 hidden">
                                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="4"><polyline points="20 6 9 17 4 12" /></svg>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else if (type === 'WORD_CLOUD') {
                    contentHtml = `<div class="word-cloud-container flex flex-wrap justify-center items-center gap-6 min-h-[300px] border border-white/5 bg-white/5 rounded-[2rem] p-10"></div>`;
                } else if (type === 'QA') {
                    contentHtml = `<div class="qa-container space-y-4 max-h-[500px] overflow-y-auto px-4 custom-scrollbar"></div>`;
                } else if (type === 'SLIDER') {
                    contentHtml = `
                        <div class="slider-result-container py-12 px-6 bg-white/5 rounded-[2rem] border border-white/5 text-center">
                            <div class="text-8xl font-black text-violet-400 mb-6 average-value">0.0</div>
                            <div class="flex justify-between items-center max-w-2xl mx-auto px-4">
                                <span class="text-slate-500 font-bold uppercase tracking-wider">${slide.minLabel}</span>
                                <div class="h-2 flex-1 mx-8 bg-slate-800 rounded-full relative overflow-hidden">
                                    <div class="h-full bg-violet-500 absolute average-bar transition-all" style="width: 0%"></div>
                                </div>
                                <span class="text-slate-500 font-bold uppercase tracking-wider">${slide.maxLabel}</span>
                            </div>
                        </div>
                    `;
                }

                const slideHtml = `
                    <div id="slide-${slideNum}" class="slide ${currentSlide === slideNum ? 'active' : ''}" data-type="${type}" data-quiz="${slide.quizMode || false}">
                        <div class="w-full max-w-4xl">
                            <div class="flex justify-between items-end mb-12">
                                <div>
                                    <div class="text-violet-500 font-black mb-2 flex items-center gap-2 uppercase tracking-tighter">
                                        ${icon}
                                        ${type.replace('_', ' ')}
                                    </div>
                                    <h2 class="text-5xl font-black">${slide.question}</h2>
                                </div>
                                <div class="vote-count-text text-4xl font-black text-slate-700">0 Responses</div>
                            </div>
                            ${contentHtml}
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', slideHtml);
            });

            document.getElementById('total-slides').innerText = (data.slides?.length || 0) + 1;
            if (!isEmbed) {
                document.getElementById('controls').classList.remove('hidden');
            }

            // Re-generate QR
            const qrContainer = document.getElementById('qrcode-large');
            if (qrContainer) {
                qrContainer.innerHTML = '';
                const localIp = "192.168.3.109";
                const origin = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
                    ? `http://${localIp}:${window.location.port}`
                    : window.location.origin;
                const liveUrl = `${origin}/live-interaction.html?id=${sessionId}`;
                new QRCode(qrContainer, {
                    text: liveUrl,
                    width: 250,
                    height: 250,
                    colorDark: "#020617",
                    colorLight: "#ffffff"
                });
            }
        }

        function updateSlide() {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            const slideEl = document.getElementById(`slide-${currentSlide}`);
            if (slideEl) slideEl.classList.add('active');
            document.getElementById('current-slide').innerText = currentSlide;
            update(sessionRef, { activeSlide: currentSlide });
            handleQuizLogic();
        }

        function handleQuizLogic() {
            if (currentSlide === 1 || !sessionData) {
                document.getElementById('quiz-controls').classList.add('hidden');
                clearInterval(timerInterval);
                return;
            }

            const slideIdx = currentSlide - 2;
            const slide = sessionData.slides[slideIdx];
            const quizElement = document.getElementById('quiz-controls');
            const revealBtn = document.getElementById('reveal-btn');
            const timerDisplay = document.getElementById('timer-display');

            clearInterval(timerInterval);

            if (slide && slide.type === 'POLL' && slide.quizMode) {
                quizElement.classList.remove('hidden');
                revealBtn.classList.remove('hidden');
                revealBtn.disabled = false;
                revealBtn.innerText = "REVEAL ANSWER";
                revealBtn.classList.remove('bg-emerald-600');
                revealBtn.classList.add('bg-violet-600');

                // Show timer if set
                if (slide.timer > 0) {
                    timerDisplay.classList.remove('hidden');
                    let timeLeft = slide.timer;
                    timerDisplay.innerText = timeLeft.toString().padStart(2, '0');

                    timerInterval = setInterval(() => {
                        timeLeft--;
                        timerDisplay.innerText = timeLeft.toString().padStart(2, '0');
                        if (timeLeft <= 0) {
                            clearInterval(timerInterval);
                            revealAnswer();
                        }
                    }, 1000);
                } else {
                    timerDisplay.classList.add('hidden');
                }
            } else if (slide && slide.timer > 0) {
                // Non-quiz timer
                quizElement.classList.remove('hidden');
                revealBtn.classList.add('hidden');
                timerDisplay.classList.remove('hidden');

                let timeLeft = slide.timer;
                timerDisplay.innerText = timeLeft.toString().padStart(2, '0');
                timerInterval = setInterval(() => {
                    timeLeft--;
                    timerDisplay.innerText = timeLeft.toString().padStart(2, '0');
                    if (timeLeft <= 0) clearInterval(timerInterval);
                }, 1000);
            } else {
                quizElement.classList.add('hidden');
            }
        }

        window.revealAnswer = function () {
            const slideIdx = currentSlide - 2;
            update(sessionRef, { [`revealed/${slideIdx}`]: true });

            const revealBtn = document.getElementById('reveal-btn');
            if (revealBtn) {
                revealBtn.disabled = true;
                revealBtn.innerText = "ANSWER REVEALED";
                revealBtn.classList.add('bg-emerald-600');
                revealBtn.classList.remove('bg-violet-600');
            }
            clearInterval(timerInterval);

            // On screen visual highlights
            highlightCorrectAnswer();
        }

        function highlightCorrectAnswer() {
            const slideIdx = currentSlide - 2;
            const slide = sessionData.slides[slideIdx];
            if (!slide || slide.type !== 'POLL' || !slide.quizMode) return;

            const correctIdx = Number(slide.correctAnswer) - 1;
            const slideEl = document.getElementById(`slide-${currentSlide}`);
            if (!slideEl) return;

            slideEl.querySelectorAll('.option-wrapper').forEach((wrapper, idx) => {
                const bar = wrapper.querySelector('.vote-bar');
                const indicator = wrapper.querySelector('.correct-indicator');
                if (idx === correctIdx) {
                    bar.style.borderColor = '#10b981';
                    bar.style.background = 'rgba(16, 185, 129, 0.1)';
                    indicator.classList.remove('hidden');
                    indicator.classList.add('opacity-100');
                    wrapper.querySelector('.option-text').classList.add('text-emerald-400');
                } else {
                    bar.style.opacity = '0.4';
                }
            });
        }

        window.showLeaderboard = function () {
            const overlay = document.getElementById('leaderboard-overlay');
            const list = document.getElementById('leaderboard-list');
            const empty = document.getElementById('leaderboard-empty');

            overlay.classList.remove('hidden');
            setTimeout(() => overlay.classList.replace('opacity-0', 'opacity-100'), 10);

            onValue(ref(db, `sessions/${sessionId}/leaderboard`), (snap) => {
                const data = snap.val();
                if (!data) {
                    list.innerHTML = '';
                    empty.classList.remove('hidden');
                    return;
                }
                empty.classList.add('hidden');

                // Sort by score descending
                const sorted = Object.values(data).sort((a, b) => b.score - a.score).slice(0, 10);

                list.innerHTML = sorted.map((p, i) => `
                    <div class="leaderboard-item flex items-center justify-between p-6 rounded-3xl animate-slide-up" style="animation-delay: ${i * 100}ms">
                        <div class="flex items-center gap-8">
                            <div class="w-12 h-12 flex items-center justify-center font-black text-2xl ${i < 3 ? 'text-violet-400' : 'text-slate-600'}">
                                ${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '#' + (i + 1)}
                            </div>
                            <div class="text-left">
                                <div class="text-2xl font-black text-white">${p.name}</div>
                                <div class="text-xs font-bold text-slate-500 uppercase tracking-widest">Participant</div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-3xl font-black text-violet-400">${p.score}</div>
                            <div class="text-[10px] font-black text-slate-600 uppercase tracking-widest">Points</div>
                        </div>
                    </div>
                `).join('');
            }, { onlyOnce: true });
        };

        window.hideLeaderboard = function () {
            const overlay = document.getElementById('leaderboard-overlay');
            overlay.classList.replace('opacity-100', 'opacity-0');
            setTimeout(() => overlay.classList.add('hidden'), 500);
        };

        window.nextSlide = function () {
            const total = (sessionData?.slides?.length || 0) + 1;
            if (currentSlide < total) {
                currentSlide++;
                updateSlide();
            }
        };

        window.prevSlide = function () {
            if (currentSlide > 1) {
                currentSlide--;
                updateSlide();
            }
        };

        function updateVoteDisplay(votes) {
            if (!votes || !sessionData) return;

            document.querySelectorAll('.slide').forEach((slideEl, sIdx) => {
                if (sIdx === 0) return; // Skip welcome slide
                const slideIdx = sIdx - 1;
                const slideData = sessionData.slides[slideIdx];
                const slideVotes = votes[slideIdx] || {};
                const type = slideEl.dataset.type;

                // Update response count
                const totalResponses = Object.keys(slideVotes).length;
                const voteCountText = slideEl.querySelector('.vote-count-text');
                if (voteCountText) voteCountText.innerText = `${totalResponses} Responses`;

                if (type === 'POLL') {
                    const optionCounts = {};
                    Object.values(slideVotes).forEach(v => optionCounts[v] = (optionCounts[v] || 0) + 1);

                    slideEl.querySelectorAll('.vote-fill').forEach((fill, optIndex) => {
                        const count = optionCounts[optIndex] || 0;
                        const percent = totalResponses > 0 ? Math.round((count / totalResponses) * 100) : 0;
                        fill.style.width = `${percent}%`;
                        const percentLabel = fill.closest('.relative').querySelector('.percent-label');
                        if (percentLabel) percentLabel.innerText = `${percent}%`;
                    });
                } else if (type === 'QA') {
                    const qaContainer = slideEl.querySelector('.qa-container');
                    qaContainer.innerHTML = Object.values(slideVotes).map(text => `
                        <div class="bg-white/5 border border-white/10 p-5 rounded-2xl text-xl animate-scale-in">
                            ${text}
                        </div>
                    `).join('');
                } else if (type === 'WORD_CLOUD') {
                    const cloudContainer = slideEl.querySelector('.word-cloud-container');
                    const wordCounts = {};
                    Object.values(slideVotes).forEach(phrase => {
                        const words = phrase.toLowerCase().trim().split(/\s+/);
                        words.forEach(w => wordCounts[w] = (wordCounts[w] || 0) + 1);
                    });

                    const palette = [
                        '#7C3AED', '#60a5fa', '#34d399', '#f59e0b',
                        '#f472b6', '#a78bfa', '#38bdf8', '#fb923c',
                        '#4ade80', '#e879f9', '#facc15', '#2dd4bf'
                    ];

                    cloudContainer.innerHTML = Object.entries(wordCounts).map(([word, count], i) => {
                        const size = Math.min(6, 1.5 + (count * 0.5));
                        const color = palette[i % palette.length];
                        return `<span style="font-size: ${size}rem; color: ${color};" class="font-black capitalize transition-all duration-500">${word}</span>`;
                    }).join('');
                } else if (type === 'SLIDER') {
                    const sum = Object.values(slideVotes).reduce((a, b) => a + Number(b), 0);
                    const avg = totalResponses > 0 ? (sum / totalResponses).toFixed(1) : "0.0";

                    slideEl.querySelector('.average-value').innerText = avg;
                    slideEl.querySelector('.average-bar').style.width = `${avg}%`;
                }

                // If revealed, highlight correct answer
                if (sessionData.revealed && sessionData.revealed[slideIdx] && slideIdx === (currentSlide - 2)) {
                    highlightCorrectAnswer();
                    const revealBtn = document.getElementById('reveal-btn');
                    if (revealBtn) {
                        revealBtn.disabled = true;
                        revealBtn.innerText = "ANSWER REVEALED";
                        revealBtn.classList.add('bg-emerald-600');
                        revealBtn.classList.remove('bg-violet-600');
                    }
                }
            });
        }

        // Global Error Handler for better debugging
        window.addEventListener('error', (event) => {
            const container = document.getElementById('slide-container');
            if (container) {
                container.innerHTML = `
                    <div class="flex items-center justify-center h-full">
                        <div class="p-10 text-red-500 bg-red-500/10 rounded-2xl border border-red-500/20 max-w-lg">
                            <h2 class="text-xl font-bold mb-2">Application Error</h2>
                            <p class="text-sm opacity-80">${event.message}</p>
                            <p class="text-[10px] mt-2 opacity-50 font-mono">${event.filename}:${event.lineno}</p>
                            <button onclick="window.location.reload()" class="mt-6 bg-red-500 text-white px-4 py-2 rounded-lg text-xs font-bold">Reload Page</button>
                        </div>
                    </div>
                `;
            }
        });

        // Initialize the presentation
        function init() {
            // Set initial header info even before Firebase loads
            const instructionEl = document.querySelector('.header-instruction-text');
            if (instructionEl) instructionEl.innerText = `Join at ${window.location.host}`;

            const codeDisplay = document.querySelector('.header-session-id');
            if (codeDisplay) codeDisplay.innerText = sessionId.substring(0, 3) + " " + sessionId.substring(3);

            onValue(sessionRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    if (!sessionData) {
                        sessionData = data;
                        renderSlides(data);

                        // Header: session title
                        const titleEl = document.querySelector('.header-session-title');
                        if (titleEl) titleEl.innerText = data.title || 'Untitled Session';

                        // Header: branding (premium feature)
                        const brandingEl = document.getElementById('header-branding');
                        const brandingDivider = document.getElementById('branding-divider');
                        if (brandingEl) {
                            const b = data.branding;
                            if (b && b.isPremium && (b.name || b.logoUrl)) {
                                brandingDivider?.classList.remove('hidden');
                                let brandHtml = '';
                                if (b.logoUrl) brandHtml += `<img src="${b.logoUrl}" alt="Brand" class="brand-logo">`;
                                if (b.name) brandHtml += `<span class="font-black text-sm text-white">${b.name}</span>`;
                                brandingEl.innerHTML = brandHtml;
                            } else if (!b || !b.isPremium) {
                                const bHtml = `<a href="dashboard.html" class="premium-lock-badge" title="Upgrade to add custom branding">
                                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                                    Add Branding
                                </a>`;
                                brandingEl.innerHTML = bHtml;
                            }
                        }

                        // Mini QR
                        const qrMiniContainer = document.getElementById('qrcode-mini');
                        if (qrMiniContainer) {
                            try {
                                qrMiniContainer.innerHTML = '';
                                const liveUrl = `${window.location.origin}/live-interaction.html?id=${sessionId}`;
                                new QRCode(qrMiniContainer, {
                                    text: liveUrl,
                                    width: 40,
                                    height: 40,
                                    colorDark: "#020617",
                                    colorLight: "#ffffff",
                                    correctLevel: QRCode.CorrectLevel.L
                                });
                            } catch (e) {
                                console.error("QR Mini failed:", e);
                                qrMiniContainer.innerText = "QR FAIL";
                            }
                        }
                    }

                    if (data.activeSlide !== undefined && data.activeSlide !== currentSlide) {
                        currentSlide = data.activeSlide;
                        updateSlide();
                    }
                    if (data.votes) {
                        updateVoteDisplay(data.votes);
                    }
                } else {
                    // Session not found
                    document.getElementById('slide-container').innerHTML = `
                        <div class="flex flex-col items-center justify-center h-full text-center p-10">
                            <div class="w-20 h-20 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mb-6">
                                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                                </svg>
                            </div>
                            <h2 class="text-3xl font-black mb-4">Session Not Found</h2>
                            <p class="text-slate-400 mb-8 text-lg">We couldn't find a session with ID: <span class="text-white font-mono">${sessionId}</span></p>
                            <a href="dashboard.html" class="bg-violet-600 px-8 py-3 rounded-xl font-bold">Return to Dashboard</a>
                        </div>
                    `;
                }
            }, (error) => {
                console.error("Firebase error:", error);
                document.getElementById('slide-container').innerHTML = `<div class="p-10 text-red-500">Connection Error: ${error.message}</div>`;
            });
        }

        // Run init immediately (module scripts are deferred)
        init();

        window.endSession = function () {
            if (!confirm("This will end the session. Participants will be shown a feedback screen. Continue?")) return;
            update(ref(db, `sessions/${sessionId}`), {
                status: 'ended',
                endedAt: Date.now()
            }).then(() => {
                // Show a summary overlay on presenter side
                const existing = document.getElementById('session-ended-overlay');
                if (!existing) {
                    const overlay = document.createElement('div');
                    overlay.id = 'session-ended-overlay';
                    overlay.className = 'fixed inset-0 z-[200] bg-slate-950/97 backdrop-blur-xl flex items-center justify-center';
                    overlay.innerHTML = `
                        <div class="text-center max-w-xl">
                            <div class="text-7xl mb-6">🎉</div>
                            <h1 class="text-5xl font-black text-white mb-4">Session Ended!</h1>
                            <p class="text-slate-400 text-lg mb-8">Participants are now being shown a feedback screen. You can view all their responses in the <strong class="text-violet-400">Admin Panel → Feedback</strong>.</p>
                            <div class="flex gap-4 justify-center">
                                <a href="dashboard.html" class="bg-violet-600 hover:bg-violet-700 text-white px-8 py-3 rounded-xl font-bold transition-all">Return to Dashboard</a>
                            </div>
                        </div>
                    `;
                    document.body.appendChild(overlay);
                }
            }).catch(err => alert('Error ending session: ' + err.message));
        };

        window.deleteThisSession = function () {
            if (!confirm('Are you sure you want to archive this session?')) return;
            update(ref(db, `sessions/${sessionId}`), { status: 'deleted', deleted: true, deletedAt: Date.now() })
                .then(() => window.location.href = 'dashboard.html')
                .catch(err => alert('Error: ' + err.message));
        };

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
            if (e.key === 'Escape') exitPresentation();
        });
    </script>
</body>

</html>
