<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - Quantum Step</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        .auth-container {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-logo img {
            width: 40px;
            margin-bottom: 0.5rem;
        }

        .auth-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e293b;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            color: #64748b;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .btn-auth {
            width: 100%;
            padding: 0.75rem 1.5rem;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

        .btn-auth:hover {
            background: #4f46e5;
        }

        .btn-auth:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: #94a3b8;
            font-size: 0.875rem;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }

        .auth-divider::before {
            margin-right: .5em;
        }

        .auth-divider::after {
            margin-left: .5em;
        }

        .btn-google {
            width: 100%;
            padding: 0.75rem;
            background: white;
            color: #475569;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .btn-google:hover {
            background: #f8fafc;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: #64748b;
        }

        .auth-footer a {
            color: #6366f1;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .auth-message {
            margin-bottom: 1rem;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.875rem;
            text-align: center;
            display: none;
        }

        .auth-message.error {
            background: #fef2f2;
            color: #ef4444;
            display: block;
        }

        .auth-message.success {
            background: #f0fdf4;
            color: #10b981;
            display: block;
        }

        .auth-message.warning {
            background: #fffbeb;
            color: #f59e0b;
            display: block;
        }
    </style>
</head>

<body>

    <div class="auth-container">
        <div class="auth-logo">
            <a href="index.html">
                <img src="logo-dark.png" alt="Quantum Step Creations" style="height: 40px; width:auto;">
            </a>
        </div>

        <h1 id="auth-title" class="auth-title">Sign In to EngageIQ</h1>

        <div id="auth-message" class="auth-message"></div>
        <div id="resend-verification-container" style="display: none; text-align: center; margin-bottom: 1rem;">
            <button id="resend-verification-btn" class="btn-auth" style="background: #10b981; margin-top: 0;">Resend
                Verification Link</button>
        </div>

        <form id="auth-form">
            <div id="name-group" class="form-group" style="display: none;">
                <label for="auth-name" class="form-label">Full Name</label>
                <input type="text" id="auth-name" class="form-control" placeholder="John Doe">
            </div>

            <div class="form-group">
                <label for="auth-email" class="form-label">Email Address</label>
                <input type="email" id="auth-email" class="form-control" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="auth-password" class="form-label">Password</label>
                <input type="password" id="auth-password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" id="auth-submit-btn" class="btn-auth">Sign In</button>
        </form>

        <div class="auth-divider">or continue with</div>

        <button id="google-signin-btn" class="btn-google">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                    fill="#4285F4" />
                <path
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                    fill="#34A853" />
                <path
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                    fill="#FBBC05" />
                <path
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                    fill="#EA4335" />
            </svg>
            Google
        </button>

        <div class="auth-footer">
            <span id="toggle-text">Don't have an account? </span>
            <a href="#" id="toggle-auth-mode">Sign Up</a>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
    <!-- Analytics Tracking -->
    <script type="module" src="analytics.js"></script>
</body>

</html>
